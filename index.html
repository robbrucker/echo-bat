    <title>Echo Bat</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; overscroll-behavior: none; }
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      body { cursor: none; }

      .gh-link {
        position: fixed;
        top: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px 8px 10px;
        color: rgba(210, 235, 255, 0.85);
        background: rgba(8, 14, 30, 0.55);
        border: 1px solid rgba(120, 200, 255, 0.35);
        border-radius: 999px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        text-decoration: none;
        font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow:
          0 0 0 1px rgba(120, 200, 255, 0.08),
          0 0 18px rgba(120, 200, 255, 0.18),
          inset 0 0 12px rgba(120, 200, 255, 0.08);
        transition: color 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
        z-index: 10;
      }
      .gh-link svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        filter: drop-shadow(0 0 6px rgba(140, 220, 255, 0.55));
      }
      .gh-link:hover {
        color: rgba(235, 250, 255, 1);
        border-color: rgba(180, 230, 255, 0.7);
        background: rgba(12, 22, 44, 0.7);
        box-shadow:
          0 0 0 1px rgba(180, 230, 255, 0.2),
          0 0 24px rgba(140, 220, 255, 0.45),
          inset 0 0 16px rgba(140, 220, 255, 0.15);
        transform: translateY(-1px);
      }
      .gh-link:active { transform: translateY(0); }
    </style>
  </head>
